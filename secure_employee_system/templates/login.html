{% extends "base.html" %}
{% set title = "Login - Employee Management System" %}

{% block content %}
<section class="auth-panel mx-auto">
    <h1 class="h3 mb-3">Secure Login</h1>
    <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" name="username" class="form-control" maxlength="30" autocomplete="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3 mb-0 text-center small">
        No account yet? <a href="/register">Register here</a>.
    </p>
</section>
{% endblock %}
