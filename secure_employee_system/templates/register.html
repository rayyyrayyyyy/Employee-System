{% extends "base.html" %}
{% set title = "Register - Employee Management System" %}

{% block content %}
<section class="form-panel mx-auto">
    <h1 class="h3 mb-3">Register Employee Account</h1>
    <form method="post" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" class="form-control" minlength="3" maxlength="30" required>
            </div>
            <div class="col-12">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" minlength="8" autocomplete="new-password" required>
                <div class="form-text">Minimum 8 characters with uppercase, lowercase, number, and special character.</div>
            </div>
            <div class="col-md-6">
                <label for="full_name" class="form-label">Full Name</label>
                <input id="full_name" name="full_name" class="form-control" maxlength="100" required>
            </div>
            <div class="col-md-6">
                <label for="position" class="form-label">Position</label>
                <input id="position" name="position" class="form-control" maxlength="80" required>
            </div>
            <div class="col-md-6">
                <label for="salary" class="form-label">Salary</label>
                <input id="salary" name="salary" type="number" class="form-control" min="0" step="0.01" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-4">Create Account</button>
    </form>
</section>
{% endblock %}
