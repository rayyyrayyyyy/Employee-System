{% extends "base.html" %}
{% set title = "Edit Employee - Employee Management System" %}

{% block content %}
<section class="form-panel mx-auto">
    <h1 class="h3 mb-3">Edit Employee</h1>
    <form method="post" action="/admin/employees/{{ employee.id }}/edit">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
            <label for="full_name" class="form-label">Full Name</label>
            <input id="full_name" name="full_name" class="form-control" value="{{ employee.full_name }}" maxlength="100" required>
        </div>
        <div class="mb-3">
            <label for="position" class="form-label">Position</label>
            <input id="position" name="position" class="form-control" value="{{ employee.position }}" maxlength="80" required>
        </div>
        <div class="mb-3">
            <label for="salary" class="form-label">Salary</label>
            <input id="salary" name="salary" type="number" class="form-control" value="{{ "%.2f"|format(employee.salary) }}" min="0" step="0.01" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
